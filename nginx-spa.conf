server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — Angular Router handles client-side routes.
    # index.html must NOT be cached: it references content-hashed chunk files
    # that change every deploy. A stale index.html points at chunks that 404,
    # which makes lazy-loaded routes (templates, pricing, guide, …) silently
    # fail to navigate. Always revalidate the HTML shell.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # Long-cache immutable hashed assets (filenames change when content changes).
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
