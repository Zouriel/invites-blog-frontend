server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — Angular Router handles client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache immutable hashed assets.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
