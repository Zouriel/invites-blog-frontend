@switch (state()) {
  @case (ViewState.Loading) {
    <div class="notice">
      <ui-spinner size="lg" label="Opening your invitation" />
      <ui-text variant="body" class="muted">Opening your invitation…</ui-text>
    </div>
  }
  @case (ViewState.NotOnList) {
    <div class="notice">
      <ui-result
        status="warning"
        title="You're not on the guest list"
        subtitle="This invitation is reserved for invited guests. The email you verified isn't on the list — if you have another email, sign out and try that one."
      >
        <ui-button variant="ghost" (click)="saveToInbox()">Go to my inbox</ui-button>
      </ui-result>
    </div>
  }
  @case (ViewState.Cancelled) {
    <div class="notice">
      <ui-result
        status="warning"
        title="This event has been cancelled"
        [subtitle]="message() || 'The host has cancelled this event.'"
      >
        <ui-button variant="ghost" (click)="goHome()">Back to invites.blog</ui-button>
      </ui-result>
    </div>
  }
  @case (ViewState.Error) {
    <div class="notice">
      <ui-result
        status="404"
        title="This invitation isn't available"
        [subtitle]="message() || 'This link is not valid or has expired.'"
      >
        <ui-button variant="ghost" (click)="goHome()">Back to invites.blog</ui-button>
      </ui-result>
    </div>
  }
  @case (ViewState.Ready) {
    <!-- The invite iframe scrolls its own content natively; the template runtime animates the
         reveal/curtain from the iframe's own scroll. -->
    <iframe
      #frame
      class="invite-frame"
      title="Your invitation"
      [src]="iframeSrc()!"
      sandbox="allow-scripts"
      (load)="onFrameLoad()"
    ></iframe>

    <!-- Fixed overlays (don't affect layout) -->
    <div class="floating">
      <ui-button variant="primary" size="lg" class="rsvp" (click)="goRsvp()">RSVP</ui-button>
    </div>
    <ui-fab label="Save this invitation to your inbox" (click)="saveToInbox()">★</ui-fab>
  }
}
