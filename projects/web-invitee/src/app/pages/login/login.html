<ui-container size="sm" class="page">
  <ui-button variant="link" class="back" (click)="goHome()">← Home</ui-button>

  <ui-stack [gap]="2" class="intro">
    <ui-text variant="h6" class="eyebrow">Your inbox</ui-text>
    <ui-text variant="h1" class="display">Let's find your invitations</ui-text>
    <ui-text variant="body" class="muted">
      Verify the email address a host used to invite you. We'll send a one-time code.
    </ui-text>
  </ui-stack>

  <ui-card padding="lg">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <ui-stack [gap]="4">
        @if (gateMessage()) {
          <ui-alert tone="warning">{{ gateMessage() }}</ui-alert>
        }
        <ui-form-field
          label="Email address"
          [error]="
            form.controls.email.touched && form.controls.email.invalid
              ? 'Enter a valid email address.'
              : ''
          "
        >
          <ui-input formControlName="email" type="email" placeholder="you@email.com" />
        </ui-form-field>

        <ui-button type="submit" variant="primary" size="lg" [block]="true" [loading]="loading()">
          {{ loading() ? 'Sending…' : 'Send code' }}
        </ui-button>
      </ui-stack>
    </form>
  </ui-card>
</ui-container>
