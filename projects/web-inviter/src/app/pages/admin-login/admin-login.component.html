<section class="wrap">
  <div class="ib-container ib-container--narrow">
    <header class="head">
      <span class="eyebrow">Admin</span>
      <ui-text variant="h1">Staff sign in</ui-text>
      <ui-text variant="body" class="lead">
        Sign in to manage the template library.
      </ui-text>
    </header>

    <ui-card padding="lg">
      @if (failed()) {
        <ui-alert tone="danger" heading="Sign in failed">
          Check your email and password, then try again.
        </ui-alert>
      }
      <form [formGroup]="form" (ngSubmit)="submit()">
        <ui-form-field label="Email" [required]="true" [error]="error('email')">
          <ui-input formControlName="email" type="email" placeholder="you@example.com" />
        </ui-form-field>
        <ui-form-field label="Password" [required]="true" [error]="error('password')">
          <ui-input formControlName="password" type="password" placeholder="••••••••" />
        </ui-form-field>

        <div class="actions">
          <ui-button type="submit" variant="primary" [loading]="loading()" [block]="true">
            Sign in
          </ui-button>
        </div>
      </form>
    </ui-card>
  </div>
</section>
