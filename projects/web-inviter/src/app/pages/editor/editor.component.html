<section class="ed">
  <div class="topbar">
    <div class="ib-container topbar__inner">
      <div class="topbar__left">
        <span class="eyebrow topbar__eyebrow">Design your invite</span>
        <ui-text variant="h2" class="topbar__title">{{ titleValue() || 'Untitled invitation' }}</ui-text>
      </div>
      <div class="topbar__actions">
        @if (savedAt(); as at) {
          <ui-badge tone="success">Saved {{ at }}</ui-badge>
        }
        <ui-button variant="outline" [disabled]="saving()" (click)="saveDraft()">Save draft</ui-button>
        <ui-button variant="primary" [loading]="saving()" (click)="next()">Next: Guests →</ui-button>
      </div>
    </div>
  </div>

  <div class="ib-container">
    <app-wizard-steps [active]="stepKey" />

    <div class="layout">
      <ui-card padding="lg" class="panel">
        <ui-text variant="h3">Event details</ui-text>
        <form [formGroup]="form">
          <ui-form-field label="Event title" [required]="true" [error]="error('title')">
            <ui-input formControlName="title" placeholder="e.g. Amira & Yusuf's Wedding" />
          </ui-form-field>
          <ui-form-field label="Subtitle" hint="Optional">
            <ui-input formControlName="subtitle" placeholder="Together with their families" />
          </ui-form-field>
          <ui-form-field label="Description" hint="Optional">
            <ui-textarea formControlName="description" [rows]="3" placeholder="A short, warm note about the occasion…" />
          </ui-form-field>

          <div class="row">
            <ui-form-field label="Date" [required]="true" [error]="error('date')">
              <ui-date-picker formControlName="date" placeholder="Pick the event date" />
            </ui-form-field>
            <ui-form-field label="Time" hint="Optional">
              <ui-time-picker formControlName="time" />
            </ui-form-field>
          </div>

          <ui-form-field label="Schedule" hint="Optional">
            <ui-textarea formControlName="schedule" [rows]="2" placeholder="6:00 PM Reception · 7:30 PM Dinner" />
          </ui-form-field>
          <ui-form-field label="Dress code" hint="Optional">
            <ui-input formControlName="dressCode" placeholder="Formal / Black tie" />
          </ui-form-field>
        </form>
      </ui-card>

      <div class="preview">
        <div class="preview__bar">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span class="preview__label">Live preview</span>
        </div>
        @if (previewSrc(); as src) {
          <iframe
            #preview
            [src]="src | safeUrl"
            class="preview__frame"
            title="Live invitation preview"
            (load)="onFrameLoad()"
          ></iframe>
        } @else {
          <div class="preview__empty">
            <p>Preview unavailable — reopen this invite from its template to see the live preview.</p>
          </div>
        }
      </div>
    </div>
  </div>
</section>
