<section class="wrap">
  <div class="ib-container ib-container--narrow">
    <app-wizard-steps [active]="stepKey" />
    <header class="head">
      <span class="eyebrow">Step 5 · Delivery</span>
      <ui-text variant="h1">How should invites be sent?</ui-text>
      <ui-text variant="body" class="lead">
        Choose your channels and set the message guests receive with their link.
      </ui-text>
    </header>

    <ui-card padding="lg">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <ui-text variant="h3">How should invites be sent?</ui-text>
        <ui-radio-group formControlName="trigger" [options]="triggerOptions" />
        <p class="rule">
          Guests without a phone number get email. Guests with neither are listed as
          <strong>“not sent”</strong> in your report.
        </p>

        <ui-form-field
          label="Message template"
          hint="Use the placeholder token to personalize with each guest's name."
        >
          <ui-textarea formControlName="messageTemplate" [rows]="3" />
        </ui-form-field>

        <div class="actions">
          <ui-button type="submit" variant="primary" [loading]="saving()">
            Save &amp; continue →
          </ui-button>
        </div>
      </form>
    </ui-card>
  </div>
</section>
