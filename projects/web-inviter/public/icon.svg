    <rect x="120" y="164" width="272" height="196" rx="26" fill="#ffffff" fill-opacity="0.06"/>
    <path d="M132 182 L256 288 L380 182"/>
  </g>

  <!-- wax-seal heart -->
  <g transform="translate(256 300)">
    <circle r="46" fill="url(#gold)"/>
    <path transform="translate(0 3) scale(1.15)"
          d="M0 16 C -14 2 -24 -6 -24 -16 C -24 -26 -14 -30 -6 -25 C -2 -22 0 -18 0 -18 C 0 -18 2 -22 6 -25 C 14 -30 24 -26 24 -16 C 24 -6 14 2 0 16 Z"
          fill="#5b21b6"/>
  </g>
</svg>
